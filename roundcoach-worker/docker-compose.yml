services:
  redis:
    image: redis:7-alpine
    container_name: roundcoach-worker-redis
    restart: unless-stopped
    ports:
      - '6379:6379'

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: roundcoach-worker
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      PORT: 3002
      REDIS_URL: redis://redis:6379
      QUEUE_NAME: vod-processing
      API_BASE_URL: http://host.docker.internal:3000/api/v1
      INTERNAL_API_TOKEN: roundcoach-internal-dev-token
      WORKER_CONCURRENCY: 2
      PROCESSING_DELAY_MS: 3000
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '3002:3002'
