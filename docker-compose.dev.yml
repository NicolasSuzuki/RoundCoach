services:
  api:
    command: sh -c "npm install && npx prisma generate && npm run start:dev"
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: 'true'
      WATCHPACK_POLLING: 'true'
    volumes:
      - ./roundcoach-api:/app
      - roundcoach_api_node_modules:/app/node_modules

  web:
    command: sh -c "npm install && npm run dev"
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: 'true'
      WATCHPACK_POLLING: 'true'
      VITE_API_URL: http://localhost:3000/api/v1
    volumes:
      - ./roundcoach-web:/app
      - roundcoach_web_node_modules:/app/node_modules

volumes:
  roundcoach_api_node_modules:
  roundcoach_web_node_modules:
